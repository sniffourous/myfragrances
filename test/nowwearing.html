<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Now Wearing - My Fragrance Collection</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; margin: 0; background: #0a0a0a; color: #e0e0e0; }
        header { background: linear-gradient(135deg, #1a1a1a, #0f0f0f); color: white; padding: 1.8rem; text-align: center; }
        h1 { margin: 0; font-size: 2.2rem; }

        #stats-card {
            margin: 16px;
            padding: 20px;
            background: linear-gradient(135deg, #1a1a1a, #0f0f0f);
            border-radius: 12px;
            border: 2px solid #60a5fa;
            text-align: center;
        }

        .table-wrapper { padding: 20px; overflow-x: auto; }
        table { min-width: 1000px; border-collapse: collapse; background: #111; width: 100%; }
        th, td { padding: 12px 10px; border-bottom: 1px solid #333; cursor: pointer; }
        th { background: #1a1a1a; color: #fff; position: sticky; top: 0; }
        tr:hover { background: #1f2a3a; }
        tr.tap-active { background: #3a4a6a !important; }

        footer { text-align: center; padding: 30px; color: #888; background: #111; }
    </style>
</head>
<body>
    <header>
        <h1>Now Wearing</h1>
    </header>

    <div id="stats-card">
        <h3 id="stats-title">v3.7 - Tap Test</h3>
        <div id="stats-content" style="font-size:1.2rem; font-weight:bold;"></div>
    </div>

    <div class="table-wrapper">
        <table id="nowwearing-table">
            <thead>
                <tr>
                    <th>Date</th>
                    <th>Brand</th>
                    <th>Name</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

    <footer id="footer">Loading...</footer>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <script>
        async function loadNowWearing() {
            try {
                const url = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRU5S6orMQ6ZMdAkt8lFoFgaSAd9hfM1F9BMipKg1pxxjgxNfIczP5j598EwO8TkqG3yN60u9IjKGrN/pub?gid=775413918&single=true&output=csv";
                const res = await fetch(url + '?t=' + Date.now());
                const text = await res.text();

                Papa.parse(text, {
                    header: true,
                    skipEmptyLines: true,
                    complete: (result) => {
                        let data = result.data.filter(row => row.Date && row.Name)
                            .map(row => {
                                Object.keys(row).forEach(key => {
                                    if (typeof row[key] === 'string') row[key] = row[key].trim();
                                });
                                return row;
                            });
                        
                        data = data.reverse();

                        const tbody = document.querySelector('#nowwearing-table tbody');
                        tbody.innerHTML = data.map(row => `
                            <tr data-brand="\( {row.Brand || ''}" data-name=" \){row.Name || ''}">
                                <td>${row.Date || ''}</td>
                                <td>${row.Brand || ''}</td>
                                <td><strong>${row.Name || ''}</strong></td>
                            </tr>
                        `).join('');

                        tbody.querySelectorAll('tr').forEach(tr => {
                            tr.addEventListener('click', () => {
                                tr.classList.add('tap-active');
                                setTimeout(() => tr.classList.remove('tap-active'), 300);

                                const brand = tr.getAttribute('data-brand') || '';
                                const name = tr.getAttribute('data-name') || '';
                                document.getElementById('stats-content').innerHTML = `<strong>${brand} - ${name}</strong>`;
                            });
                        });

                        document.getElementById('footer').innerHTML = `<strong>${data.length}</strong> recent wears logged`;
                    }
                });
            } catch (e) {
                document.getElementById('footer').innerHTML = `<strong style="color:#ff6666;">Error loading data</strong>`;
            }
        }

        function toggleMenu() {
            document.getElementById('menu').classList.toggle('active');
        }

        window.onload = loadNowWearing;
    </script>
</body>
</html>
